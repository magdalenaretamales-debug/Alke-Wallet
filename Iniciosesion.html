<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Wallet - Login</title>
  <link rel="stylesheet" href="./assets/css/iniciosesion.css"/>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <style>
    body {
      padding: 20px;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
    }

  </style>
</head>
<body>
  <div class="container">
    <h2 class="text-info">Inicio Sesión</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" class="form-control border-info" id="email" placeholder="Ingresar Email">
      </div>
      <div class="form-group">
        <label for="contrasena">Contraseña:</label>
        <input type="password" class="form-control border-info" id="contrasena" placeholder="Ingresar contraseña">
      </div>
      <button type="submit" class="btn btn-info">Ingresar</button>
    </form>
    <p id="mensaje"></p>

    <script src="./assets/js/iniciosesion.js"></script>
  </div>
</body>
</html>
